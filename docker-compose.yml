version: '3.9'
services:

  dashboard:
     build: 
      context: .
      dockerfile: dashboard/Dockerfile

     ports:
      - "5173:5173"
     depends_on:
      - gateway

  gateway:
     build:
      context: .
      dockerfile: Dockerfile
     env_file:
      - .env
     ports:
      - "3000:3000"
     depends_on:
      - user
      - product
      - order
      - redis
      
      
  user:
     build:
      context: .
      dockerfile: services/user/Dockerfile
     ports:
       - "4001:4001"
  product:
     build: 
      context: .
      dockerfile: services/product/Dockerfile  
     ports:
        - "4002:4002"

  order:
     build:     
      context: .
      dockerfile: services/order/Dockerfile   
     ports:
        - "4003:4003" 

  redis:
     image: redis:latest
     ports:
        - "6379:6379"
  







